services:
  db:
    image: postgres:16
    container_name: hackathon-postgres
    restart: always
    shm_size: 128mb
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    env_file:
      - .env
    ports :
      - "${POSTGRES_PORT}:${POSTGRES_PORT}"
    volumes:
      - ./backend/docker_data/dev/postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}" ]
      interval: 10s
      timeout: 5s
      retries: 20
    networks:
      - app_network

networks:
  app_network:
volumes:
  node_modules:


